name: Security Credential Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Run credential exposure scan
      run: |
        chmod +x howpwndami.py
        ./howpwndami.py --json --save
      continue-on-error: true

    - name: Upload scan results
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-results
        path: howpwndami_report.json
        retention-days: 30

    - name: Check for critical findings
      run: |
        CRITICAL_COUNT=$(jq '.summary.by_risk_level.CRITICAL // 0' howpwndami_report.json)
        HIGH_COUNT=$(jq '.summary.by_risk_level.HIGH // 0' howpwndami_report.json)

        echo "Critical findings: $CRITICAL_COUNT"
        echo "High findings: $HIGH_COUNT"

        if [ $CRITICAL_COUNT -gt 0 ]; then
          echo "::error::Found $CRITICAL_COUNT critical security findings!"
          exit 1
        fi

        if [ $HIGH_COUNT -gt 5 ]; then
          echo "::warning::Found $HIGH_COUNT high-risk findings (threshold: 5)"
        fi

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('howpwndami_report.json', 'utf8'));

          const summary = report.summary;
          const criticalCount = summary.by_risk_level.CRITICAL || 0;
          const highCount = summary.by_risk_level.HIGH || 0;

          let emoji = '✅';
          if (criticalCount > 0) emoji = '🚨';
          else if (highCount > 3) emoji = '⚠️';

          const body = `## ${emoji} Security Credential Scan Results

          **Total Findings:** ${summary.total_findings}
          - 🚨 Critical: ${criticalCount}
          - ⚠️ High: ${highCount}
          - 🔶 Medium: ${summary.by_risk_level.MEDIUM || 0}
          - 🔵 Low: ${summary.by_risk_level.LOW || 0}

          ${criticalCount > 0 ? '**⚠️ Critical findings detected! Please review before merging.**' : ''}

          <details>
          <summary>View Findings by Category</summary>

          ${report.findings.map(f => `- **${f.category}**: ${f.description} (${f.risk_level})`).join('\n')}

          </details>

          [Download full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
